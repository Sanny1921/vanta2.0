<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Vanta - Redirecting</title>
    <script>
      // GitHub Pages SPA redirect fix
      // Converts the path into a query string so index.html can restore it
      // Based on: https://github.com/rafgraph/spa-github-pages
      var pathSegmentsToKeep = 1; // Keep '/vanta' prefix (1 segment)
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
    Redirecting&hellip;
  </body>
</html>
